# Generates a PDF of the /cv/ page after each Jekyll build and commits it
# to assets/ so the "Download PDF" button on cv.md always stays current.
name: Generate CV PDF

on:
  push:
    branches: ["main"]
    paths:
      - "cv.md"
      - "_layouts/default.html"
      - "assets/**"

jobs:
  pdf:
    runs-on: ubuntu-latest
    needs: []   # runs independently; adjust to 'build' if you want to chain

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install Node deps
        run: npm install puppeteer

      - name: Generate PDF
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              executablePath: '/usr/bin/chromium-browser',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.goto('https://tamasszabo.org/cv/', { waitUntil: 'networkidle2' });
            await page.emulateMediaType('print');
            await page.pdf({
              path: 'assets/tamas-szabo-cv.pdf',
              format: 'A4',
              margin: { top: '1.5cm', bottom: '1.5cm', left: '1.5cm', right: '1.5cm' },
              printBackground: false
            });
            await browser.close();
          })();
          "

      - name: Commit PDF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/tamas-szabo-cv.pdf
          git diff --cached --quiet || git commit -m "chore: regenerate CV PDF [skip ci]"
          git push
